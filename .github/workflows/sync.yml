name: Sync Notion → data.json

on:
  schedule:
    # 매일 오전 8시 KST = 23:00 UTC (전날)
    - cron: '0 23 * * *'
  workflow_dispatch:  # 수동 실행 버튼

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Notion sync
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python sync.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain data.json)" ]; then
            git add data.json
            git commit -m "chore(sync): auto-update data.json from Notion [skip ci]"
            git push
            echo "pushed"
          else
            echo "no changes"
          fi
