<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>식물행성 Dashboard</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard-dynamic-subset.css');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a0a0a;--card:#141414;--card2:#1a1a1a;--border:#222;--green:#22c55e;--red:#ef4444;--orange:#f59e0b;--blue:#3b82f6;--purple:#a855f7;--txt:#e5e5e5;--txt2:#888;--txt3:#555}
body{font-family:Pretendard,-apple-system,sans-serif;background:var(--bg);color:var(--txt);min-height:100dvh;overflow-x:hidden;padding-bottom:72px}
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 8px;position:sticky;top:0;background:var(--bg);z-index:50}
.header-left{display:flex;align-items:center;gap:10px}
.logo{width:36px;height:36px;background:linear-gradient(135deg,#22c55e,#16a34a);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.header h1{font-size:18px;font-weight:700}
.header .date{font-size:12px;color:var(--txt2);margin-top:1px}
.status-badge{font-size:11px;color:var(--txt2);display:flex;align-items:center;gap:4px}
.status-dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.refresh-btn{width:32px;height:32px;border:none;background:none;color:var(--txt2);font-size:18px;cursor:pointer;border-radius:8px}
.refresh-btn:active{background:var(--card)}
.refresh-btn.spinning{animation:spin .8s linear}
@keyframes spin{to{transform:rotate(360deg)}}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,10,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:6px 0 env(safe-area-inset-bottom,8px);z-index:100}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 8px;cursor:pointer;border:none;background:none;color:var(--txt3);font-size:10px;position:relative;min-width:52px;font-family:inherit}
.nav-item.active{color:var(--green)}
.nav-item .icon{font-size:20px;line-height:1}
.nav-badge{position:absolute;top:0;right:4px;background:var(--red);color:#fff;font-size:9px;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px}
.tab-content{display:none;padding:8px 16px 20px}
.tab-content.active{display:block}
.section-title{font-size:13px;font-weight:600;color:var(--txt2);margin:16px 0 8px;display:flex;align-items:center;gap:6px}
.section-title .cnt{font-size:11px;color:var(--orange)}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.card-title{font-size:14px;font-weight:600}
.card-sub{font-size:11px;color:var(--txt2);margin-top:2px}
.card-badge{font-size:10px;padding:3px 8px;border-radius:6px;font-weight:600}
.badge-pending{background:rgba(245,158,11,.15);color:var(--orange)}
.badge-done{background:rgba(34,197,94,.15);color:var(--green)}
.img-scroll{display:flex;gap:8px;overflow-x:auto;padding:4px 0;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
.img-scroll::-webkit-scrollbar{display:none}
.img-thumb{width:90px;height:112px;border-radius:8px;object-fit:cover;scroll-snap-align:start;flex-shrink:0;background:var(--card2);cursor:pointer;border:2px solid transparent;transition:border-color .2s}
.img-thumb:active{border-color:var(--green)}
.caption-preview{font-size:12px;color:var(--txt2);margin:8px 0;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.blog-excerpt{font-size:13px;color:var(--txt2);line-height:1.6;margin:8px 0;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.read-more{color:var(--blue);font-size:12px;font-weight:600;cursor:pointer;border:none;background:none;padding:4px 0;font-family:inherit}
.invoice-table{width:100%;font-size:12px;margin:8px 0}
.invoice-table td{padding:4px 0;color:var(--txt2)}
.invoice-table td:first-child{color:var(--txt)}
.invoice-table td:last-child{text-align:right;font-variant-numeric:tabular-nums}
.invoice-table .total-row td{border-top:1px solid var(--border);padding-top:8px;font-weight:600;color:var(--txt)}
.action-row{display:flex;gap:8px;margin-top:12px}
.btn{flex:1;padding:10px;border-radius:10px;border:none;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;font-family:inherit;transition:transform .1s}
.btn:active{transform:scale(.97)}
.btn-approve{background:rgba(34,197,94,.15);color:var(--green)}
.btn-reject{background:rgba(239,68,68,.1);color:var(--red)}
.process-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:6px}
.process-icon{font-size:22px;width:36px;text-align:center}
.process-info{flex:1}
.process-name{font-size:13px;font-weight:600}
.process-desc{font-size:11px;color:var(--txt2);margin-top:1px}
.process-status{font-size:11px;margin-top:2px}
.process-check{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px}
.check-ok{background:rgba(34,197,94,.15);color:var(--green)}
.check-warn{background:rgba(245,158,11,.15);color:var(--orange)}
.check-err{background:rgba(239,68,68,.15);color:var(--red)}
.api-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.api-item:last-child{border-bottom:none}
.api-left{display:flex;align-items:center;gap:8px}
.api-dot{width:6px;height:6px;border-radius:50%}
.api-name{font-size:13px}
.api-badge{font-size:10px;padding:2px 8px;border-radius:4px}
.sched-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.sched-left{display:flex;gap:10px;align-items:center}
.sched-day{background:var(--card2);width:40px;height:40px;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;color:var(--txt2)}
.sched-day .d{font-size:16px;font-weight:700;color:var(--txt);line-height:1}
.sched-name{font-size:13px;font-weight:600}
.sched-time{font-size:11px;color:var(--txt2)}
.sched-on{font-size:10px;padding:2px 8px;border-radius:4px;background:rgba(34,197,94,.1);color:var(--green)}
.sched-off{font-size:10px;padding:2px 8px;border-radius:4px;background:rgba(136,136,136,.1);color:var(--txt3)}
.skill-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.skill-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center}
.skill-emoji{font-size:28px;margin-bottom:6px}
.skill-name{font-size:12px;font-weight:600}
.skill-desc{font-size:10px;color:var(--txt2);margin-top:2px}
.log-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.log-item:last-child{border-bottom:none}
.log-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0}
.log-time{font-size:10px;color:var(--txt3);margin-top:2px}
.log-title{font-size:13px;font-weight:500}
.log-desc{font-size:11px;color:var(--txt2);margin-top:1px}
.empty-box{text-align:center;padding:30px 20px;color:var(--txt3);font-size:13px}
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 8px;text-align:center}
.stat-num{font-size:20px;font-weight:700}
.stat-label{font-size:10px;color:var(--txt2);margin-top:2px}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.96);z-index:200;display:none;flex-direction:column}
.modal-overlay.show{display:flex}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;flex-shrink:0}
.modal-close{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.1);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-counter{color:var(--txt2);font-size:13px}
.modal-title{color:#fff;font-size:14px;font-weight:600;flex:1;margin:0 12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.viewer-wrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.viewer-img{max-width:100%;max-height:100%;object-fit:contain}
.viewer-nav{position:absolute;top:50%;transform:translateY(-50%);width:40px;height:60px;background:rgba(255,255,255,.08);border:none;color:#fff;font-size:22px;cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center}
.viewer-nav:active{background:rgba(255,255,255,.15)}
.viewer-prev{left:8px}
.viewer-next{right:8px}
.viewer-dots{display:flex;justify-content:center;gap:6px;padding:12px;flex-shrink:0}
.viewer-dot{width:6px;height:6px;border-radius:50%;background:var(--txt3);transition:all .2s}
.viewer-dot.active{background:#fff;width:18px;border-radius:3px}
.reader-body{flex:1;overflow-y:auto;padding:16px 20px;-webkit-overflow-scrolling:touch;font-size:14px;line-height:1.8;color:var(--txt2)}
.reader-body h1,.reader-body h2,.reader-body h3{color:var(--txt);margin:16px 0 8px;font-size:16px}
.reader-body p{margin-bottom:12px}
.detail-body{flex:1;overflow-y:auto;padding:16px 20px;-webkit-overflow-scrolling:touch}
.detail-section{margin-bottom:16px}
.detail-section h3{font-size:14px;font-weight:600;margin-bottom:8px}
.detail-table{width:100%;font-size:12px;border-collapse:collapse}
.detail-table th{text-align:left;padding:8px 6px;color:var(--txt2);border-bottom:1px solid var(--border);font-weight:500}
.detail-table td{padding:8px 6px;border-bottom:1px solid var(--border)}
.modal-actions{padding:12px 16px;display:flex;gap:8px;flex-shrink:0;border-top:1px solid var(--border)}
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.8);background:rgba(30,30,30,.95);color:#fff;padding:16px 24px;border-radius:14px;font-size:14px;font-weight:600;z-index:300;opacity:0;pointer-events:none;transition:all .3s;text-align:center;backdrop-filter:blur(10px);border:1px solid var(--border)}
.toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <div class="logo">🌿</div>
    <div><h1>식물행성</h1><div class="date" id="headerDate"></div></div>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <span class="status-badge" id="statusBadge"></span>
    <button class="refresh-btn" id="refreshBtn" onclick="loadData()">↻</button>
  </div>
</div>
<div class="tab-content active" id="tab-inbox"></div>
<div class="tab-content" id="tab-status"></div>
<div class="tab-content" id="tab-schedule"></div>
<div class="tab-content" id="tab-skills"></div>
<div class="tab-content" id="tab-log"></div>
<nav class="bottom-nav">
  <button class="nav-item active" data-tab="inbox"><span class="icon">📬</span>대기함<span class="nav-badge" id="inboxBadge" style="display:none">0</span></button>
  <button class="nav-item" data-tab="status"><span class="icon">⚙️</span>현황</button>
  <button class="nav-item" data-tab="schedule"><span class="icon">📅</span>예약</button>
  <button class="nav-item" data-tab="skills"><span class="icon">✨</span>스킬</button>
  <button class="nav-item" data-tab="log"><span class="icon">📋</span>로그</button>
</nav>
<div class="modal-overlay" id="imageViewer">
  <div class="modal-header">
    <span class="modal-counter" id="viewerCounter"></span>
    <span class="modal-title" id="viewerTitle"></span>
    <button class="modal-close" onclick="closeViewer()">✕</button>
  </div>
  <div class="viewer-wrap" id="viewerWrap">
    <img class="viewer-img" id="viewerImg">
    <button class="viewer-nav viewer-prev" onclick="viewerNav(-1)">‹</button>
    <button class="viewer-nav viewer-next" onclick="viewerNav(1)">›</button>
  </div>
  <div class="viewer-dots" id="viewerDots"></div>
</div>
<div class="modal-overlay" id="blogReader">
  <div class="modal-header">
    <span class="modal-title" id="readerTitle"></span>
    <button class="modal-close" onclick="closeReader()">✕</button>
  </div>
  <div class="reader-body" id="readerBody"></div>
  <div class="modal-actions">
    <button class="btn btn-approve" id="readerApprove" style="flex:1">✅ 게시 승인</button>
    <button class="btn btn-reject" id="readerReject" style="flex:1">❌ 반려</button>
  </div>
</div>
<div class="modal-overlay" id="invoiceModal">
  <div class="modal-header">
    <span class="modal-title" id="invoiceTitle"></span>
    <button class="modal-close" onclick="closeInvoice()">✕</button>
  </div>
  <div class="detail-body" id="invoiceBody"></div>
  <div class="modal-actions">
    <button class="btn btn-approve" id="invApprove" style="flex:1">✅ 송장 업로드</button>
    <button class="btn btn-reject" id="invReject" style="flex:1">❌ 보류</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const REPO='duduri/plant-planet-dashboard',ISSUE_URL=`https://github.com/${REPO}/issues/new`;
let DATA=null,vImgs=[],vIdx=0,touchX=0;
const now=new Date(),days=['일','월','화','수','목','금','토'];
document.getElementById('headerDate').textContent=`${now.getMonth()+1}/${now.getDate()} ${days[now.getDay()]}`;
document.querySelectorAll('.nav-item').forEach(b=>{b.addEventListener('click',()=>{
  document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');document.getElementById('tab-'+b.dataset.tab).classList.add('active');
});});
async function loadData(){
  const rb=document.getElementById('refreshBtn');rb.classList.add('spinning');
  try{const r=await fetch('data.json?t='+Date.now());DATA=await r.json();renderAll();}
  catch(e){console.error(e);showToast('데이터 로드 실패');}
  setTimeout(()=>rb.classList.remove('spinning'),800);
}
function renderAll(){
  if(!DATA)return;
  const s=DATA.systemStatus||'normal';
  const col={normal:'var(--green)',warning:'var(--orange)',error:'var(--red)'};
  const lab={normal:'시스템 정상',warning:'주의',error:'오류'};
  document.getElementById('statusBadge').innerHTML=`<span class="status-dot" style="background:${col[s]}"></span>${lab[s]}`;
  renderInbox();renderStatus();renderSchedule();renderSkills();renderLog();
}
function renderInbox(){
  const el=document.getElementById('tab-inbox'),pa=DATA.pendingApprovals||{};
  const cn=pa.cardNews||[],bp=pa.blogPosts||[],inv=pa.invoices||[];
  const total=cn.length+bp.length+inv.length;
  const badge=document.getElementById('inboxBadge');
  if(total>0){badge.textContent=total;badge.style.display='flex';}else badge.style.display='none';
  let h=`<div class="stats-bar">
    <div class="stat-box"><div class="stat-num" style="color:var(--green)">${DATA.stats?.todayRuns||0}</div><div class="stat-label">오늘 실행</div></div>
    <div class="stat-box"><div class="stat-num" style="color:${(DATA.stats?.errors||0)>0?'var(--red)':'var(--txt)'}">${DATA.stats?.errors||0}</div><div class="stat-label">오류</div></div>
    <div class="stat-box"><div class="stat-num" style="color:var(--blue)">${total}</div><div class="stat-label">승인 대기</div></div>
    <div class="stat-box"><div class="stat-num">${DATA.stats?.activeSkills||0}</div><div class="stat-label">활성 스킬</div></div></div>`;
  h+=`<div class="section-title">🎨 카드뉴스 게시 대기 <span class="cnt">${cn.length}건</span></div>`;
  if(!cn.length)h+=`<div class="card"><div class="empty-box">대기중인 카드뉴스가 없습니다</div></div>`;
  cn.forEach((it,i)=>{
    h+=`<div class="card"><div class="card-header"><div><div class="card-title">${it.title}</div><div class="card-sub">${it.createdAt?fmtTime(it.createdAt):''}</div></div><span class="card-badge badge-pending">대기중</span></div>`;
    h+=`<div class="img-scroll">${(it.images||[]).map((img,j)=>`<img class="img-thumb" src="${img}" onclick="openViewer(${i},${j})" onerror="this.onerror=null;this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHdpZHRoPSc5MCcgaGVpZ2h0PScxMTInPjxyZWN0IHdpZHRoPSc5MCcgaGVpZ2h0PScxMTInIGZpbGw9JyMyMzIzMjMnLz48dGV4dCB4PSc0NScgeT0nNTUnIHRleHQtYW5jaG9yPSdtaWRkbGUnIGZpbGw9JyM4ODgnIGZvbnQtc2l6ZT0nMTEnIGZvbnQtZmFtaWx5PSdzYW5zLXNlcmlmJz7rr7jrpqzrs7TquLA8L3RleHQ+PHRleHQgeD0nNDUnIHk9JzcxJyB0ZXh0LWFuY2hvcj0nbWlkZGxlJyBmaWxsPScjODg4JyBmb250LXNpemU9JzExJyBmb250LWZhbWlseT0nc2Fucy1zZXJpZic+7KSA67mE7KSRPC90ZXh0Pjwvc3ZnPg==';this.onclick=null">`).join('')}${!(it.images||[]).length?'<div style="width:90px;height:112px;background:var(--card2);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--txt3);font-size:11px">미리보기 없음</div>':''}</div>`;
    h+=`<div class="caption-preview">📝 ${it.caption||'캡션 없음'}</div>`;
    h+=`<div class="action-row"><button class="btn btn-approve" onclick="doApprove('cardnews','${it.id}','${esc(it.title)}')">✅ 게시 승인</button><button class="btn btn-reject" onclick="doReject('cardnews','${it.id}','${esc(it.title)}')">❌ 반려</button></div></div>`;
  });
  h+=`<div class="section-title">✍️ 블로그 게시 대기 <span class="cnt">${bp.length}건</span></div>`;
  if(!bp.length)h+=`<div class="card"><div class="empty-box">대기중인 블로그 글이 없습니다</div></div>`;
  bp.forEach((it,i)=>{
    h+=`<div class="card"><div class="card-header"><div><div class="card-title">${it.title}</div><div class="card-sub">${it.createdAt?fmtTime(it.createdAt):''}</div></div><span class="card-badge badge-pending">대기중</span></div>`;
    h+=`<div class="blog-excerpt">${it.excerpt||''}</div><button class="read-more" onclick="openBlog(${i})">전체 보기 →</button>`;
    h+=`<div class="action-row"><button class="btn btn-approve" onclick="doApprove('blog','${it.id}','${esc(it.title)}')">✅ 게시 승인</button><button class="btn btn-reject" onclick="doReject('blog','${it.id}','${esc(it.title)}')">❌ 반려</button></div></div>`;
  });
  h+=`<div class="section-title">📦 송장 처리 대기 <span class="cnt">${inv.length}건</span></div>`;
  if(!inv.length)h+=`<div class="card"><div class="empty-box">대기중인 송장 처리가 없습니다</div></div>`;
  inv.forEach((it,i)=>{
    const chs=it.channels||[],tAmt=chs.reduce((s,c)=>s+(c.amount||0),0),tCnt=chs.reduce((s,c)=>s+(c.count||0),0);
    h+=`<div class="card"><div class="card-header"><div><div class="card-title">${it.title}</div><div class="card-sub">${it.createdAt?fmtTime(it.createdAt):''}</div></div><span class="card-badge badge-pending">대기중</span></div>`;
    h+=`<table class="invoice-table">${chs.map(c=>`<tr><td>${c.name}</td><td>${c.count}건</td><td>₩${(c.amount||0).toLocaleString()}</td></tr>`).join('')}<tr class="total-row"><td>합계</td><td>${tCnt}건</td><td>₩${tAmt.toLocaleString()}</td></tr></table>`;
    h+=`<button class="read-more" onclick="openInvoice(${i})">상세 보기 →</button>`;
    h+=`<div class="action-row"><button class="btn btn-approve" onclick="doApprove('invoice','${it.id}','${esc(it.title)}')">✅ 송장 업로드</button><button class="btn btn-reject" onclick="doReject('invoice','${it.id}','${esc(it.title)}')">❌ 보류</button></div></div>`;
  });
  el.innerHTML=h;
}
function renderStatus(){
  const el=document.getElementById('tab-status');let h='';
  h+=`<div class="section-title">⚙️ 자동화 프로세스</div>`;
  (DATA.processes||[]).forEach(p=>{
    const cls=p.status==='active'?'check-ok':p.status==='error'?'check-err':'check-warn';
    const ico=p.status==='active'?'✓':p.status==='error'?'✕':'⏳';
    const col=p.status==='active'?'var(--green)':p.status==='error'?'var(--red)':'var(--orange)';
    h+=`<div class="process-item"><div class="process-icon">${p.icon||'📌'}</div><div class="process-info"><div class="process-name">${p.name}</div><div class="process-desc">${p.schedule||''}</div><div class="process-status" style="color:${col}">● ${p.lastRun||''}</div></div><div class="process-check ${cls}">${ico}</div></div>`;
  });
  h+=`<div class="section-title" style="margin-top:24px">🔗 API 연동</div><div class="card" style="padding:4px 14px">`;
  (DATA.apis||[]).forEach(a=>{
    const ok=a.status==='connected',col=ok?'var(--green)':'var(--red)',lab=ok?'연결됨':'오류';
    h+=`<div class="api-item"><div class="api-left"><span class="api-dot" style="background:${col}"></span><span class="api-name">${a.name}</span></div><span class="api-badge" style="background:${ok?'rgba(34,197,94,.1)':'rgba(239,68,68,.1)'};color:${col}">${lab}</span></div>`;
  });
  h+=`</div>`;el.innerHTML=h;
}
function renderSchedule(){
  const el=document.getElementById('tab-schedule');let h=`<div class="section-title">📅 예약 작업</div>`;
  (DATA.scheduledTasks||[]).forEach(t=>{
    h+=`<div class="sched-item"><div class="sched-left"><div class="sched-day"><span class="d">${t.day||''}</span>${t.time||''}</div><div><div class="sched-name">${t.name}</div><div class="sched-time">${t.desc||''}</div>${t.lastRunAt?`<div class="sched-time" style="color:var(--green);margin-top:2px">최근: ${fmtTime(t.lastRunAt)}</div>`:''}</div></div><span class="${t.enabled!==false?'sched-on':'sched-off'}">${t.enabled!==false?'ON':'OFF'}</span></div>`;
  });
  el.innerHTML=h;
}
function renderSkills(){
  const el=document.getElementById('tab-skills');let h=`<div class="section-title">✨ 활성 스킬</div><div class="skill-grid">`;
  (DATA.skills||[]).forEach(s=>{h+=`<div class="skill-card"><div class="skill-emoji">${s.emoji}</div><div class="skill-name">${s.name}</div><div class="skill-desc">${s.desc}</div></div>`;});
  h+=`</div>`;el.innerHTML=h;
}
function renderLog(){
  const el=document.getElementById('tab-log');let h=`<div class="section-title">📋 활동 로그</div>`;
  const cols={green:'var(--green)',blue:'var(--blue)',purple:'var(--purple)',orange:'var(--orange)',red:'var(--red)'};
  (DATA.activityLog||[]).forEach(l=>{
    h+=`<div class="log-item"><span class="log-dot" style="background:${cols[l.color]||'var(--txt3)'}"></span><div><div class="log-title">${l.title}</div><div class="log-desc">${l.desc||''}</div><div class="log-time">${l.time||''}</div></div></div>`;
  });
  if(!(DATA.activityLog||[]).length)h+=`<div class="empty-box">📭 활동 로그가 없습니다</div>`;
  el.innerHTML=h;
}
function openViewer(ci,ii){
  const cn=DATA.pendingApprovals?.cardNews||[];if(!cn[ci])return;
  vImgs=cn[ci].images||[];vIdx=ii;
  document.getElementById('viewerTitle').textContent=cn[ci].title;
  updViewer();document.getElementById('imageViewer').classList.add('show');document.body.style.overflow='hidden';
}
function closeViewer(){document.getElementById('imageViewer').classList.remove('show');document.body.style.overflow='';}
function updViewer(){
  document.getElementById('viewerImg').src=vImgs[vIdx]||'';
  document.getElementById('viewerCounter').textContent=`${vIdx+1} / ${vImgs.length}`;
  document.getElementById('viewerDots').innerHTML=vImgs.map((_,i)=>`<span class="viewer-dot${i===vIdx?' active':''}"></span>`).join('');
}
function viewerNav(d){vIdx=(vIdx+d+vImgs.length)%vImgs.length;updViewer();}
document.getElementById('viewerWrap').addEventListener('touchstart',e=>{touchX=e.touches[0].clientX;},{passive:true});
document.getElementById('viewerWrap').addEventListener('touchend',e=>{const d=e.changedTouches[0].clientX-touchX;if(Math.abs(d)>50)viewerNav(d<0?1:-1);},{passive:true});
function openBlog(i){
  const bp=DATA.pendingApprovals?.blogPosts||[];if(!bp[i])return;const it=bp[i];
  document.getElementById('readerTitle').textContent=it.title;
  document.getElementById('readerBody').innerHTML=it.fullContent||`<p>${it.excerpt||'내용 없음'}</p>`;
  document.getElementById('readerApprove').onclick=()=>{closeReader();doApprove('blog',it.id,it.title);};
  document.getElementById('readerReject').onclick=()=>{closeReader();doReject('blog',it.id,it.title);};
  document.getElementById('blogReader').classList.add('show');document.body.style.overflow='hidden';
}
function closeReader(){document.getElementById('blogReader').classList.remove('show');document.body.style.overflow='';}
function openInvoice(i){
  const inv=DATA.pendingApprovals?.invoices||[];if(!inv[i])return;const it=inv[i];
  document.getElementById('invoiceTitle').textContent=it.title;
  let h='';(it.channels||[]).forEach(ch=>{
    h+=`<div class="detail-section"><h3>${ch.name} (${ch.count}건)</h3>`;
    if(ch.orders?.length){h+=`<table class="detail-table"><tr><th>주문번호</th><th>상품</th><th>금액</th></tr>`;
      ch.orders.forEach(o=>{h+=`<tr><td>${o.orderNo||'-'}</td><td>${o.product||'-'}</td><td>₩${(o.amount||0).toLocaleString()}</td></tr>`;});
      h+=`</table>`;}h+=`</div>`;});
  document.getElementById('invoiceBody').innerHTML=h||'<p style="color:var(--txt3)">상세 정보 없음</p>';
  document.getElementById('invApprove').onclick=()=>{closeInvoice();doApprove('invoice',it.id,it.title);};
  document.getElementById('invReject').onclick=()=>{closeInvoice();doReject('invoice',it.id,it.title);};
  document.getElementById('invoiceModal').classList.add('show');document.body.style.overflow='hidden';
}
function closeInvoice(){document.getElementById('invoiceModal').classList.remove('show');document.body.style.overflow='';}
function doApprove(type,id,title){
  const lab={cardnews:'인스타 게시',blog:'블로그 게시',invoice:'송장 업로드'};
  const p=new URLSearchParams({title:`✅ 승인: ${title}`,body:`**타입:** ${type}\n**ID:** ${id}\n**작업:** ${lab[type]||type}\n**시각:** ${new Date().toISOString()}\n\n> 대시보드에서 자동 생성된 승인 요청입니다.\n> 이 이슈를 Submit하면 Claude가 자동 처리합니다.`,labels:'dashboard-command,approve'});
  showToast('✅ 승인 요청 생성중...');setTimeout(()=>window.open(`${ISSUE_URL}?${p}`,'_blank'),500);
}
function doReject(type,id,title){
  const p=new URLSearchParams({title:`❌ 반려: ${title}`,body:`**타입:** ${type}\n**ID:** ${id}\n**시각:** ${new Date().toISOString()}\n**사유:** (여기에 사유를 작성해주세요)\n\n> 대시보드에서 자동 생성된 반려 요청입니다.`,labels:'dashboard-command,reject'});
  showToast('❌ 반려 요청 생성중...');setTimeout(()=>window.open(`${ISSUE_URL}?${p}`,'_blank'),500);
}
function esc(s){return(s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;');}
function fmtTime(iso){try{const d=new Date(iso);return`${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;}catch(e){return iso;}}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800);}
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
setInterval(loadData,300000);
loadData();
</script>
</body>
</html>
