name: Dashboard Command Handler

on:
  issues:
    types: [opened, labeled]

jobs:
  handle-command:
    if: contains(github.event.issue.labels.*.name, 'dashboard-command')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse command and update data.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          LABELS: ${{ toJson(github.event.issue.labels.*.name) }}
        run: |
          set -euo pipefail

          # Determine action from labels
          if echo "$LABELS" | grep -q '"approve"'; then
            ACTION="approve"; VERB="승인"; EMOJI="✅"
          elif echo "$LABELS" | grep -q '"reject"'; then
            ACTION="reject"; VERB="반려"; EMOJI="❌"
          else
            echo "No approve/reject label. Skipping."
            exit 0
          fi

          # Extract TYPE and ID from issue body
          TYPE=$(printf '%s' "$ISSUE_BODY" | grep -oP '\*\*타입:\*\*\s*\K[^\s]+' | head -1 || true)
          ID=$(printf '%s' "$ISSUE_BODY" | grep -oP '\*\*ID:\*\*\s*\K[^\s]+' | head -1 || true)

          if [ -z "$TYPE" ] || [ -z "$ID" ]; then
            gh issue comment "$ISSUE_NUM" --body "⚠️ 명령 파싱 실패: 타입 또는 ID를 찾을 수 없습니다."
            exit 1
          fi

          case "$TYPE" in
            cardnews) KEY="cardNews" ;;
            blog)     KEY="blogPosts" ;;
            invoice)  KEY="invoices" ;;
            *)
              gh issue comment "$ISSUE_NUM" --body "⚠️ 알 수 없는 타입: $TYPE"
              exit 1
              ;;
          esac

          TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Update data.json: remove from pendingApprovals, prepend to activityLog
          jq --arg k "$KEY" --arg id "$ID" --arg action "$ACTION" --arg ts "$TS" --arg type "$TYPE" '
            (.pendingApprovals[$k] // []) as $items |
            ($items | map(select(.id == $id)) | first) as $found |
            if $found then
              .pendingApprovals[$k] = ($items | map(select(.id != $id)))
              | .activityLog = ([{time: $ts, type: $type, id: $id, action: $action, title: ($found.title // "")}] + (.activityLog // []))
              | .stats.pendingCount = (((.pendingApprovals.cardNews // []) | length) + ((.pendingApprovals.blogPosts // []) | length) + ((.pendingApprovals.invoices // []) | length))
              | .lastUpdated = $ts
            else . end
          ' data.json > data.json.new
          mv data.json.new data.json

          git config user.name "dashboard-bot[bot]"
          git config user.email "dashboard-bot@users.noreply.github.com"
          git add data.json

          if git diff --staged --quiet; then
            gh issue comment "$ISSUE_NUM" --body "⚠️ 해당 ID(\`$ID\`)를 pendingApprovals에서 찾을 수 없었습니다. 이미 처리되었거나 잘못된 ID입니다."
            gh issue close "$ISSUE_NUM"
            exit 0
          fi

          git commit -m "dashboard: $ACTION $TYPE $ID"
          git push

          # Post type-specific completion comment
          case "$TYPE:$ACTION" in
            cardnews:approve)
              BODY=$(printf '%s\n%s\n\n%s' "$EMOJI **카드뉴스 $VERB 완료**" "data.json이 갱신되었고 activityLog에 기록되었습니다." "📸 **다음 단계(수동):** 로컬에서 \`instagram-upload\` 스킬을 실행해 실제 인스타그램 발행을 완료해주세요.")
              ;;
            blog:approve)
              BODY=$(printf '%s\n%s\n\n%s' "$EMOJI **블로그 $VERB 완료**" "data.json이 갱신되었고 activityLog에 기록되었습니다." "✍️ **다음 단계(수동):** 네이버 블로그 발행은 로컬 크리덴셜이 필요하므로 로컬에서 실행해주세요.")
              ;;
            invoice:approve)
              BODY=$(printf '%s\n%s\n\n%s' "$EMOJI **송장 $VERB 완료**" "data.json이 갱신되었고 activityLog에 기록되었습니다." "📦 **다음 단계(수동):** \`invoice-assistant\` 스킬로 판매채널(스마트스토어/쿠팡/카페24/오늘의집) 송장 업로드를 실행해주세요.")
              ;;
            *:reject)
              BODY=$(printf '%s\n%s' "$EMOJI **$TYPE $VERB 처리 완료**" "data.json이 갱신되었고 activityLog에 기록되었습니다.")
              ;;
            *)
              BODY="$EMOJI $VERB 처리 완료"
              ;;
          esac

          gh issue comment "$ISSUE_NUM" --body "$BODY"
          gh issue close "$ISSUE_NUM"
